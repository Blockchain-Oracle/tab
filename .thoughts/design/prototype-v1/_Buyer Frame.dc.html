<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
<style>body{margin:0;font-family:'Geist',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}</style>
</helmet>
<div style="position:relative;width:100%;height:740px;background:#FAF9F6;overflow:hidden;font-family:'Geist',system-ui,sans-serif;color:#1C1B18;">

  <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 24px 8px;font-size:13.5px;font-weight:600;">
    <span>9:41</span>
    <div style="display:flex;align-items:center;gap:5px;">
      <div style="display:flex;align-items:flex-end;gap:1.5px;height:10px;">
        <div style="width:2.5px;height:4px;background:#1C1B18;border-radius:1px;"></div>
        <div style="width:2.5px;height:6px;background:#1C1B18;border-radius:1px;"></div>
        <div style="width:2.5px;height:8px;background:#1C1B18;border-radius:1px;"></div>
        <div style="width:2.5px;height:10px;background:#1C1B18;border-radius:1px;"></div>
      </div>
      <div style="width:20px;height:10px;border:1px solid #1C1B18;border-radius:3px;padding:1px;"><div style="width:70%;height:100%;background:#1C1B18;border-radius:1.5px;"></div></div>
    </div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;">
    <div style="display:flex;align-items:baseline;gap:1px;font-family:'Newsreader',serif;font-size:20px;font-weight:500;letter-spacing:-0.01em;">atlas<span style="color:#206B4E;">.</span></div>
    <div style="display:flex;align-items:center;gap:16px;">
      <span style="font-size:12px;color:#5F5D55;">Shop</span>
      <svg width="16" height="17" viewBox="0 0 16 17" fill="none"><rect x="2.5" y="5" width="11" height="10" rx="2" stroke="#1C1B18" stroke-width="1.4"></rect><path d="M5.5 5V4a2.5 2.5 0 0 1 5 0v1" stroke="#1C1B18" stroke-width="1.4" fill="none"></path></svg>
    </div>
  </div>

  <div style="padding:6px 20px 0;">
    <div style="height:206px;border-radius:14px;background:repeating-linear-gradient(-45deg,#F1EFE9 0px,#F1EFE9 10px,#EAE8E0 10px,#EAE8E0 20px);border:1px solid #E8E6DF;display:flex;align-items:center;justify-content:center;">
      <span style="font-family:'Geist Mono',monospace;font-size:10.5px;color:#8C8A80;background:#FAF9F6;padding:4px 8px;border-radius:6px;">product photo — yirgacheffe bag</span>
    </div>
    <div style="margin-top:18px;font-family:'Newsreader',serif;font-size:27px;font-weight:500;letter-spacing:-0.01em;line-height:1.1;">Yirgacheffe, Single Origin</div>
    <div style="display:flex;align-items:baseline;gap:8px;margin-top:8px;">
      <span style="font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;">$12.00</span>
      <span style="font-size:12px;color:#8C8A80;">250g · whole bean</span>
    </div>
    <div style="margin-top:10px;font-size:13px;line-height:1.55;color:#5F5D55;">Floral and bright, with apricot sweetness. Roasted to order in Oakland, shipped within 48 hours.</div>
    <div style="margin-top:20px;">
      <sc-if value="{{ hasButton }}" hint-placeholder-val="{{ true }}">
        <dc-import name="_Pay Button" state="{{ buttonState }}" hint-size="100%,48px"></dc-import>
      </sc-if>
    </div>
  </div>

  <sc-if value="{{ hasSheet }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;inset:0;background:rgba(28,27,24,0.44);"></div>
    <div style="position:absolute;left:0;right:0;bottom:0;padding:10px;">
      <dc-import name="_Checkout Sheet" view="{{ sheetView }}" balance="{{ balance }}" hint-size="100%,420px"></dc-import>
    </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:375,&quot;height&quot;:740},&quot;button&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;idle&quot;,&quot;options&quot;:[&quot;idle&quot;,&quot;loading&quot;,&quot;processing&quot;,&quot;success&quot;,&quot;error&quot;,&quot;disabled_funds&quot;,&quot;none&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Frame&quot;},&quot;sheet&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;none&quot;,&quot;options&quot;:[&quot;none&quot;,&quot;email_entry&quot;,&quot;email_submitting&quot;,&quot;otp_awaiting&quot;,&quot;otp_submitting&quot;,&quot;otp_wrong&quot;,&quot;otp_expired&quot;,&quot;otp_limited&quot;,&quot;otp_not_received&quot;,&quot;bal_loading&quot;,&quot;bal_ready&quot;,&quot;insufficient&quot;,&quot;confirming&quot;,&quot;success&quot;,&quot;err_insufficient&quot;,&quot;err_failed&quot;,&quot;err_network&quot;,&quot;err_auth&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Frame&quot;},&quot;balance&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;$847.32&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Frame&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const button = this.props.button ?? 'idle';
    const sheet = this.props.sheet ?? 'none';
    return {
      hasButton: button !== 'none',
      buttonState: button,
      hasSheet: sheet !== 'none',
      sheetView: sheet,
      balance: this.props.balance ?? '$847.32'
    };
  }
}
</script>
</body>
</html>
